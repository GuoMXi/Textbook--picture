<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="780" viewBox="0 0 1800 780">
  <defs>
    <marker id="arrA" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 z" fill="#444"/>
    </marker>
    <marker id="arrB" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 z" fill="#6c8ebf"/>
    </marker>
    <style>
      text{font-family:"PingFang SC","Microsoft YaHei",sans-serif;fill:#1f2937}
      .h{font-size:24px;font-weight:700}
      .n{font-size:18px;font-weight:600}
      .s{font-size:15px}
    </style>
  </defs>

  <rect x="80" y="90" width="1640" height="220" rx="12" fill="#f8f1d9" stroke="#d6b656" stroke-width="2"/>
  <rect x="80" y="390" width="1640" height="220" rx="12" fill="#d9e8fb" stroke="#6c8ebf" stroke-width="2"/>
  <text x="110" y="130" class="h">自然语言层级</text>
  <text x="110" y="430" class="h">程序语言层级</text>

  <rect x="140" y="170" width="240" height="92" rx="10" fill="#f8cecc" stroke="#b85450"/><text x="260" y="205" text-anchor="middle" class="n">语素</text><text x="260" y="230" text-anchor="middle" class="s">最小意义单位</text>
  <rect x="450" y="170" width="240" height="92" rx="10" fill="#ffe6cc" stroke="#d79b00"/><text x="570" y="205" text-anchor="middle" class="n">词汇</text><text x="570" y="230" text-anchor="middle" class="s">概念符号化</text>
  <rect x="760" y="170" width="240" height="92" rx="10" fill="#fff2cc" stroke="#d6b656"/><text x="880" y="205" text-anchor="middle" class="n">短语</text><text x="880" y="230" text-anchor="middle" class="s">意义组块</text>
  <rect x="1070" y="170" width="240" height="92" rx="10" fill="#d5e8d4" stroke="#82b366"/><text x="1190" y="205" text-anchor="middle" class="n">句子</text><text x="1190" y="230" text-anchor="middle" class="s">完整表达</text>
  <rect x="1380" y="170" width="240" height="92" rx="10" fill="#dae8fc" stroke="#6c8ebf"/><text x="1500" y="205" text-anchor="middle" class="n">篇章</text><text x="1500" y="230" text-anchor="middle" class="s">篇级组织</text>

  <rect x="140" y="470" width="240" height="92" rx="10" fill="#f8cecc" stroke="#b85450"/><text x="260" y="505" text-anchor="middle" class="n">字符</text><text x="260" y="530" text-anchor="middle" class="s">最小书写单位</text>
  <rect x="450" y="470" width="240" height="92" rx="10" fill="#ffe6cc" stroke="#d79b00"/><text x="570" y="505" text-anchor="middle" class="n">Token</text><text x="570" y="530" text-anchor="middle" class="s">基本语法单元</text>
  <rect x="760" y="470" width="240" height="92" rx="10" fill="#fff2cc" stroke="#d6b656"/><text x="880" y="505" text-anchor="middle" class="n">表达式</text><text x="880" y="530" text-anchor="middle" class="s">计算组块</text>
  <rect x="1070" y="470" width="240" height="92" rx="10" fill="#d5e8d4" stroke="#82b366"/><text x="1190" y="505" text-anchor="middle" class="n">语句</text><text x="1190" y="530" text-anchor="middle" class="s">完整指令</text>
  <rect x="1380" y="470" width="240" height="92" rx="10" fill="#dae8fc" stroke="#6c8ebf"/><text x="1500" y="505" text-anchor="middle" class="n">模块</text><text x="1500" y="530" text-anchor="middle" class="s">工程组织</text>

  <line x1="380" y1="216" x2="450" y2="216" stroke="#444" stroke-width="2.2" marker-end="url(#arrA)"/>
  <line x1="690" y1="216" x2="760" y2="216" stroke="#444" stroke-width="2.2" marker-end="url(#arrA)"/>
  <line x1="1000" y1="216" x2="1070" y2="216" stroke="#444" stroke-width="2.2" marker-end="url(#arrA)"/>
  <line x1="1310" y1="216" x2="1380" y2="216" stroke="#444" stroke-width="2.2" marker-end="url(#arrA)"/>

  <line x1="380" y1="516" x2="450" y2="516" stroke="#6c8ebf" stroke-width="2.2" marker-end="url(#arrB)"/>
  <line x1="690" y1="516" x2="760" y2="516" stroke="#6c8ebf" stroke-width="2.2" marker-end="url(#arrB)"/>
  <line x1="1000" y1="516" x2="1070" y2="516" stroke="#6c8ebf" stroke-width="2.2" marker-end="url(#arrB)"/>
  <line x1="1310" y1="516" x2="1380" y2="516" stroke="#6c8ebf" stroke-width="2.2" marker-end="url(#arrB)"/>

  <line x1="260" y1="262" x2="260" y2="470" stroke="#666" stroke-width="2" stroke-dasharray="8 8"/>
  <line x1="570" y1="262" x2="570" y2="470" stroke="#666" stroke-width="2" stroke-dasharray="8 8"/>
  <line x1="880" y1="262" x2="880" y2="470" stroke="#666" stroke-width="2" stroke-dasharray="8 8"/>
  <line x1="1190" y1="262" x2="1190" y2="470" stroke="#666" stroke-width="2" stroke-dasharray="8 8"/>
  <line x1="1500" y1="262" x2="1500" y2="470" stroke="#666" stroke-width="2" stroke-dasharray="8 8"/>
  <text x="260" y="370" text-anchor="middle" class="s">同层级功能对应</text>

  <rect x="260" y="670" width="1280" height="56" rx="10" fill="#f5f5f5" stroke="#666"/>
  <text x="280" y="705" class="s">配色按抽象层级统一：红(最小单位)→橙(词汇/单元)→黄(组块)→绿(完整表达)→蓝(篇章/工程组织)。</text>
</svg>
