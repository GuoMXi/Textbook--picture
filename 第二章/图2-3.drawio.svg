  <rect x="1220" y="160" width="220" height="56" rx="10" fill="#dae8fc" stroke="#1e88e5"/><text x="1330" y="195" text-anchor="middle" class="n">VP（动词短语）</text>
  <rect x="1080" y="290" width="140" height="52" rx="10" fill="#fce4ec" stroke="#d81b60"/><text x="1150" y="322" text-anchor="middle" class="s">咬死了</text>
  <rect x="1380" y="290" width="220" height="52" rx="10" fill="#edf6ff" stroke="#1e88e5"/><text x="1490" y="322" text-anchor="middle" class="s">NP（名词短语）</text>
  <rect x="1310" y="420" width="130" height="52" rx="10" fill="#edf6ff" stroke="#1e88e5"/><text x="1375" y="452" text-anchor="middle" class="s">定语</text>
  <rect x="1510" y="420" width="130" height="52" rx="10" fill="#edf6ff" stroke="#1e88e5"/><text x="1575" y="452" text-anchor="middle" class="s">中心语</text>
  <rect x="1310" y="550" width="130" height="52" rx="10" fill="#fce4ec" stroke="#d81b60"/><text x="1375" y="582" text-anchor="middle" class="s">猎人</text>
  <rect x="1510" y="550" width="130" height="52" rx="10" fill="#f3e5f5" stroke="#8e24aa"/><text x="1575" y="582" text-anchor="middle" class="s">狗</text>

  <line x1="470" y1="216" x2="305" y2="290" stroke="#444" stroke-width="2.4" marker-end="url(#arr)"/>
