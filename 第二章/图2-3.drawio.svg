  <rect x="180" y="420" width="250" height="56" rx="10" fill="#fff2cc" stroke="#d6b656"/><text x="305" y="455" text-anchor="middle" class="n">VP（动词短语）</text>
  <rect x="130" y="550" width="130" height="52" rx="10" fill="#fce4ec" stroke="#d81b60"/><text x="195" y="582" text-anchor="middle" class="s">咬死了</text>
  <rect x="340" y="550" width="130" height="52" rx="10" fill="#fce4ec" stroke="#d81b60"/><text x="405" y="582" text-anchor="middle" class="s">猎人</text>
