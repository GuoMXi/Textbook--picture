  <text x="110" y="112" class="h">理解一：[咬死了猎人]的狗（定语修饰“狗”）</text>
  <text x="970" y="112" class="h">理解二：咬死了[猎人的狗]（“狗”作宾语）</text>

  <rect x="360" y="160" width="220" height="56" rx="10" fill="#ffe6cc" stroke="#d79b00"/><text x="470" y="195" text-anchor="middle" class="n">NP（名词短语）</text>
