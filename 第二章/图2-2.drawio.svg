<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="860" viewBox="0 0 1600 860">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 z" fill="#444"/>
    </marker>
    <style>
      text{font-family:"PingFang SC","Microsoft YaHei",sans-serif;fill:#1f2937}
      .t1{font-size:22px;font-weight:700}
      .t2{font-size:18px}
    </style>
  </defs>

  <rect x="690" y="80" width="220" height="60" rx="10" fill="#e3f2fd" stroke="#1e88e5"/><text x="800" y="118" text-anchor="middle" class="t1">程序结构</text>
  <rect x="690" y="190" width="220" height="58" rx="10" fill="#e8f5e9" stroke="#43a047"/><text x="800" y="226" text-anchor="middle" class="t2">for语句</text>
  <rect x="310" y="310" width="210" height="56" rx="10" fill="#fff3e0" stroke="#fb8c00"/><text x="415" y="345" text-anchor="middle" class="t2">循环变量：i</text>
  <rect x="560" y="310" width="260" height="56" rx="10" fill="#fff3e0" stroke="#fb8c00"/><text x="690" y="345" text-anchor="middle" class="t2">迭代对象：range(10)</text>
  <rect x="940" y="310" width="170" height="56" rx="10" fill="#fff3e0" stroke="#fb8c00"/><text x="1025" y="345" text-anchor="middle" class="t2">循环体</text>
  <rect x="940" y="430" width="170" height="56" rx="10" fill="#f3e5f5" stroke="#8e24aa"/><text x="1025" y="465" text-anchor="middle" class="t2">if语句</text>
  <rect x="740" y="545" width="240" height="56" rx="10" fill="#fce4ec" stroke="#d81b60"/><text x="860" y="580" text-anchor="middle" class="t2">条件：i % 2 == 0</text>
  <rect x="1030" y="545" width="140" height="56" rx="10" fill="#fce4ec" stroke="#d81b60"/><text x="1100" y="580" text-anchor="middle" class="t2">分支体</text>
  <rect x="980" y="660" width="240" height="56" rx="10" fill="#ede7f6" stroke="#5e35b1"/><text x="1100" y="695" text-anchor="middle" class="t2">函数调用：print(i)</text>

  <line x1="800" y1="140" x2="800" y2="190" stroke="#444" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="760" y1="248" x2="430" y2="310" stroke="#444" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="790" y1="248" x2="700" y2="310" stroke="#444" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="840" y1="248" x2="1000" y2="310" stroke="#444" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="1025" y1="366" x2="1025" y2="430" stroke="#444" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="1005" y1="486" x2="900" y2="545" stroke="#444" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="1045" y1="486" x2="1085" y2="545" stroke="#444" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="1100" y1="601" x2="1100" y2="660" stroke="#444" stroke-width="2.5" marker-end="url(#arr)"/>
</svg>
