<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="920" viewBox="0 0 1800 920">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#444"/></marker>
    <style>
      text{font-family:"PingFang SC","Microsoft YaHei",sans-serif;fill:#1f2937}
      .h{font-size:22px;font-weight:700}.t{font-size:17px}.s{font-size:15px}
    </style>
  </defs>
  <text x="80" y="60" class="h">典型语料库的目录结构</text>

  <rect x="800" y="90" width="200" height="56" rx="10" fill="#e3f2fd" stroke="#1e88e5"/><text x="900" y="125" text-anchor="middle" class="t">corpus/</text>

