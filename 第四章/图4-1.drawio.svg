<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="520" viewBox="0 0 1800 520"><defs><marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 z" fill="#444"/></marker><style>text{font-family:"PingFang SC","Microsoft YaHei",sans-serif;fill:#1f2937}.h{font-size:24px;font-weight:700}.t{font-size:20px;font-weight:600}.s{font-size:16px}</style></defs><text x="80" y="70" class="h">四种基本结构的形态对比（复杂度递增）</text><rect x="90" y="140" width="360" height="220" rx="12" fill="#f8cecc" stroke="#b85450" stroke-width="2"/><text x="270" y="185" text-anchor="middle" class="t">集合 Set</text><text x="270" y="215" text-anchor="middle" class="s">A  B  C  D（无序）</text><text x="270" y="245" text-anchor="middle" class="s">只关心“有什么”</text><rect x="510" y="140" width="360" height="220" rx="12" fill="#ffe6cc" stroke="#d79b00" stroke-width="2"/><text x="690" y="185" text-anchor="middle" class="t">序列 Sequence</text><text x="690" y="215" text-anchor="middle" class="s">A → B → C → D</text><text x="690" y="245" text-anchor="middle" class="s">增加顺序信息</text><rect x="930" y="140" width="360" height="220" rx="12" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/><text x="1110" y="185" text-anchor="middle" class="t">树 Tree</text><text x="1110" y="215" text-anchor="middle" class="s">A 为根，B/C 为子</text><text x="1110" y="245" text-anchor="middle" class="s">增加层级关系</text><rect x="1350" y="140" width="360" height="220" rx="12" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/><text x="1530" y="185" text-anchor="middle" class="t">图 Graph</text><text x="1530" y="215" text-anchor="middle" class="s">节点可多路径连接</text><text x="1530" y="245" text-anchor="middle" class="s">表达任意关系网络</text><line x1="450" y1="250" x2="510" y2="250" stroke="#444" stroke-width="2.4" marker-end="url(#arr)"/><line x1="870" y1="250" x2="930" y2="250" stroke="#444" stroke-width="2.4" marker-end="url(#arr)"/><line x1="1290" y1="250" x2="1350" y2="250" stroke="#444" stroke-width="2.4" marker-end="url(#arr)"/><text x="480" y="235" class="s">+顺序</text><text x="900" y="235" class="s">+层次</text><text x="1320" y="235" class="s">+多路径</text></svg>