<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1080" viewBox="0 0 1800 1080">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 z" fill="#444"/>
    </marker>
    <marker id="arrb" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 z" fill="#6c8ebf"/>
    </marker>
    <style>
      text { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .h { font-size: 24px; font-weight: 700; }
      .t { font-size: 22px; font-weight: 600; }
      .n { font-size: 20px; }
    </style>
  </defs>

  <rect x="90" y="70" width="760" height="900" rx="12" fill="#f8f1d9" stroke="#d6b656" stroke-width="2"/>
  <rect x="940" y="70" width="760" height="900" rx="12" fill="#d9e8fb" stroke="#6c8ebf" stroke-width="2"/>
  <text x="120" y="115" class="h">自然语言：概念层级</text>
  <text x="970" y="115" class="h">程序语言：数据类型层级</text>

  <rect x="430" y="160" width="120" height="56" rx="10" fill="#fff2cc" stroke="#d6b656"/><text x="490" y="195" text-anchor="middle" class="t">生物</text>
  <rect x="280" y="280" width="120" height="56" rx="10" fill="#fff2cc" stroke="#d6b656"/><text x="340" y="315" text-anchor="middle" class="t">动物</text>
  <rect x="580" y="280" width="120" height="56" rx="10" fill="#fff2cc" stroke="#d6b656"/><text x="640" y="315" text-anchor="middle" class="t">植物</text>
  <rect x="220" y="420" width="150" height="56" rx="10" fill="#ffe6cc" stroke="#d79b00"/><text x="295" y="455" text-anchor="middle" class="t">哺乳动物</text>
  <rect x="410" y="420" width="120" height="56" rx="10" fill="#ffe6cc" stroke="#d79b00"/><text x="470" y="455" text-anchor="middle" class="t">鸟类</text>
  <rect x="180" y="560" width="100" height="56" rx="10" fill="#f3e5f5" stroke="#8e24aa"/><text x="230" y="595" text-anchor="middle" class="t">猫</text>
  <rect x="310" y="560" width="100" height="56" rx="10" fill="#f3e5f5" stroke="#8e24aa"/><text x="360" y="595" text-anchor="middle" class="t">狗</text>

  <line x1="490" y1="216" x2="340" y2="280" stroke="#444" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="490" y1="216" x2="640" y2="280" stroke="#444" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="340" y1="336" x2="295" y2="420" stroke="#444" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="340" y1="336" x2="470" y2="420" stroke="#444" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="295" y1="476" x2="230" y2="560" stroke="#444" stroke-width="2.5" marker-end="url(#arr)"/>
  <line x1="295" y1="476" x2="360" y2="560" stroke="#444" stroke-width="2.5" marker-end="url(#arr)"/>

  <rect x="1240" y="160" width="140" height="56" rx="10" fill="#dae8fc" stroke="#6c8ebf"/><text x="1310" y="195" text-anchor="middle" class="t">数据类型</text>
  <rect x="1070" y="280" width="140" height="56" rx="10" fill="#dae8fc" stroke="#6c8ebf"/><text x="1140" y="315" text-anchor="middle" class="t">基本类型</text>
  <rect x="1410" y="280" width="140" height="56" rx="10" fill="#dae8fc" stroke="#6c8ebf"/><text x="1480" y="315" text-anchor="middle" class="t">复合类型</text>
  <rect x="980" y="420" width="90" height="56" rx="10" fill="#e1d5e7" stroke="#9673a6"/><text x="1025" y="455" text-anchor="middle" class="t">int</text>
  <rect x="1090" y="420" width="100" height="56" rx="10" fill="#e1d5e7" stroke="#9673a6"/><text x="1140" y="455" text-anchor="middle" class="t">float</text>
  <rect x="1210" y="420" width="90" height="56" rx="10" fill="#e1d5e7" stroke="#9673a6"/><text x="1255" y="455" text-anchor="middle" class="t">bool</text>
  <rect x="1360" y="420" width="130" height="56" rx="10" fill="#f3e5f5" stroke="#8e24aa"/><text x="1425" y="455" text-anchor="middle" class="n">array/list</text>
  <rect x="1510" y="420" width="120" height="56" rx="10" fill="#f3e5f5" stroke="#8e24aa"/><text x="1570" y="455" text-anchor="middle" class="n">dict/map</text>
  <rect x="1370" y="560" width="100" height="56" rx="10" fill="#f3e5f5" stroke="#8e24aa"/><text x="1420" y="595" text-anchor="middle" class="t">object</text>

  <line x1="1310" y1="216" x2="1140" y2="280" stroke="#6c8ebf" stroke-width="2.5" marker-end="url(#arrb)"/>
  <line x1="1310" y1="216" x2="1480" y2="280" stroke="#6c8ebf" stroke-width="2.5" marker-end="url(#arrb)"/>
  <line x1="1140" y1="336" x2="1025" y2="420" stroke="#6c8ebf" stroke-width="2.5" marker-end="url(#arrb)"/>
  <line x1="1140" y1="336" x2="1140" y2="420" stroke="#6c8ebf" stroke-width="2.5" marker-end="url(#arrb)"/>
  <line x1="1140" y1="336" x2="1255" y2="420" stroke="#6c8ebf" stroke-width="2.5" marker-end="url(#arrb)"/>
  <line x1="1480" y1="336" x2="1425" y2="420" stroke="#6c8ebf" stroke-width="2.5" marker-end="url(#arrb)"/>
  <line x1="1480" y1="336" x2="1570" y2="420" stroke="#6c8ebf" stroke-width="2.5" marker-end="url(#arrb)"/>
  <line x1="1480" y1="336" x2="1420" y2="560" stroke="#6c8ebf" stroke-width="2.5" marker-end="url(#arrb)"/>

  <line x1="550" y1="190" x2="1240" y2="190" stroke="#999" stroke-width="2" stroke-dasharray="10 8"/>
  <text x="895" y="175" text-anchor="middle" class="n">层级分类</text>

  <rect x="360" y="980" width="1080" height="70" rx="10" fill="#f5f5f5" stroke="#666"/>
  <text x="390" y="1025" class="n">两侧都体现聚合性：上位类别决定下位可替换成员，形成可扩展的层级体系。</text>
</svg>
