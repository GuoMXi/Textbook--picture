<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 z" fill="#6c8ebf"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,4 L0,8 z" fill="#9673a6"/>
    </marker>
    <style>
      text { font-family: "PingFang SC", "Microsoft YaHei", sans-serif; fill: #1f2937; }
      .title { font-size: 30px; font-weight: 700; }
      .ghead { font-size: 22px; font-weight: 700; }
      .cardTitle { font-size: 24px; font-weight: 700; }
      .cardText { font-size: 20px; }
      .note { font-size: 20px; }
      .dash { stroke-dasharray: 10 8; }
    </style>
  </defs>

  <rect x="90" y="60" width="650" height="620" rx="12" fill="#f8f1d9" stroke="#d6b656" stroke-width="2"/>
  <rect x="860" y="60" width="650" height="620" rx="12" fill="#d9e8fb" stroke="#6c8ebf" stroke-width="2"/>
  <text x="115" y="105" class="ghead">自然语言：“学生读书”</text>
  <text x="885" y="105" class="ghead">程序语言：student.read(book)</text>

  <rect x="130" y="140" width="570" height="110" rx="10" fill="#fff2cc" stroke="#d6b656"/>
  <text x="160" y="185" class="cardTitle">单元 Unit</text>
  <text x="160" y="222" class="cardText">学生 / 读 / 书</text>

  <rect x="130" y="280" width="570" height="140" rx="10" fill="#ffe6cc" stroke="#d79b00"/>
  <text x="160" y="325" class="cardTitle">关系 Relation</text>
  <text x="160" y="362" class="cardText">学生 --主谓(SBV)--> 读</text>
  <text x="160" y="394" class="cardText">读 --动宾(VOB)--> 书</text>

  <rect x="130" y="450" width="570" height="110" rx="10" fill="#fff2cc" stroke="#d6b656"/>
  <text x="160" y="495" class="cardTitle">属性 Attribute</text>
  <text x="160" y="532" class="cardText">学生[名词] / 读[动词] / 书[名词]</text>

  <rect x="900" y="140" width="570" height="110" rx="10" fill="#dae8fc" stroke="#6c8ebf"/>
  <text x="930" y="185" class="cardTitle">单元 Unit</text>
  <text x="930" y="222" class="cardText">student / read / book</text>

  <rect x="900" y="280" width="570" height="140" rx="10" fill="#e1d5e7" stroke="#9673a6"/>
  <text x="930" y="325" class="cardTitle">关系 Relation</text>
  <text x="930" y="362" class="cardText">student --调用者--> read</text>
  <text x="930" y="394" class="cardText">read --参数--> book</text>

  <rect x="900" y="450" width="570" height="110" rx="10" fill="#dae8fc" stroke="#6c8ebf"/>
  <text x="930" y="495" class="cardTitle">属性 Attribute</text>
  <text x="930" y="532" class="cardText">student[对象] / read[方法] / book[参数]</text>

  <line x1="700" y1="195" x2="900" y2="195" stroke="#6c8ebf" stroke-width="3" class="dash" marker-end="url(#arrowBlue)"/>
  <line x1="700" y1="350" x2="900" y2="350" stroke="#9673a6" stroke-width="3" class="dash" marker-end="url(#arrowPurple)"/>
  <line x1="700" y1="505" x2="900" y2="505" stroke="#6c8ebf" stroke-width="3" class="dash" marker-end="url(#arrowBlue)"/>
  <text x="800" y="180" text-anchor="middle" class="note">要素对应</text>
  <text x="800" y="335" text-anchor="middle" class="note">结构对应</text>
  <text x="800" y="490" text-anchor="middle" class="note">特征对应</text>

  <rect x="300" y="720" width="1000" height="70" rx="10" fill="#f5f5f5" stroke="#666"/>
  <text x="330" y="765" class="note">说明：表达形式不同，但都可从单元-关系-属性三要素进行结构化分析。</text>
</svg>
